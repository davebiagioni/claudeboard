name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      PY: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install "$PY"
      - name: Install dependencies
        run: uv sync --extra dev --python "$PY"
      - name: Lint
        run: uv run --python "$PY" ruff check
      - name: Format check
        run: uv run --python "$PY" ruff format --check
      - name: Test
        run: uv run --python "$PY" pytest
